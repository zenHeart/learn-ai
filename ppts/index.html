<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 学习 PPT 导航</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🤖 AI 学习 PPT 导航</h1>
  <div class="grid">
    <a href="vibe-coding/" class="card">
      <h2>💫 Vibe Coding</h2>
      <p>AI 辅助编程</p>
    </a>
    <a href="prompt-context/" class="card">
      <h2>📝 Prompt + Context</h2>
      <p>提示词与上下文工程</p>
    </a>
    <a href="skill-mcp/" class="card">
      <h2>🔌 MCP + SKILL</h2>
      <p>模型上下文协议与技能</p>
    </a>
    <a href="agent/" class="card">
      <h2>🤖 Agent</h2>
      <p>AI Agent 实践</p>
    </a>
  </div>
</body>
</html>
